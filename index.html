<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Puzzle Dungeon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-menu">
        <h2>Puzzle Dungeon</h2>
        <button id="start-button">Start Game</button>
    </div>
    <h1>WebGL Puzzle Dungeon</h1>
    <canvas id="gameCanvas"></canvas> <div id="info">
        <p>Coins Remaining: <span id="coins-remaining"></span></p>
        <p>Level: <span id="level"></span></p>
        <p>Use Arrow Keys to move. Collect all the coins to unlock the exit!</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
